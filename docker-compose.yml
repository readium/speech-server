services:
  app:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - weights_cache:/weights
    networks:
      - speech-net
    restart: unless-stopped
    stop_grace_period: 5s

  nginx:
    image: nginx:alpine
    profiles: [nginx]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - speech-net

volumes:
  weights_cache:

networks:
  speech-net:
    driver: bridge
